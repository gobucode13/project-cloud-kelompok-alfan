version: '3.8'

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  db_data:
  wp_data:
  minio_data:

services:

  # --- DATABASE LAYER ---
  db:
    image: mysql:8.0
    container_name: wp_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend-net

  # --- CACHING LAYER ---
  redis:
    image: redis:7-alpine
    container_name: wp_redis
    restart: always
    networks:
      - backend-net

  # --- STORAGE LAYER (MinIO = S3-compatible object storage) ---
  minio:
    image: minio/minio:latest
    container_name: wp_minio
    restart: always
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service sekali-jalan: otomatis membuat bucket "wp-media" saat pertama kali up
  minio-setup:
    image: minio/mc:latest
    container_name: wp_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend-net
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing localminio/${MINIO_BUCKET};
      mc anonymous set download localminio/${MINIO_BUCKET};
      exit 0;
      "

  # --- APP LAYER ---
  wordpress:
    image: wordpress:latest
    container_name: wp_app
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      # Redis Object Cache (dibaca oleh plugin redis-cache via wp-config)
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_CACHE', true);
    volumes:
      - wp_data:/var/www/html
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - db
      - redis
      - minio

  # --- WP-CLI: otomatisasi install plugin (Redis Cache + S3 Offload) ---
  wpcli:
    image: wordpress:cli
    container_name: wp_cli
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - wordpress
      - db
    entrypoint: ["tail", "-f", "/dev/null"]
